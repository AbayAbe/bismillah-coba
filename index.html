<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Message</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#yes{
background:#22c55e;
color:white;
}

#no{
background:#ef4444;
color:white;
position:absolute;
}

#message{
font-size:22px;
margin-top:30px;
}

</style>

</head>

<body>

<h1>Halo Kamu 👋</h1>

<p>Aku punya pertanyaan penting...</p>

<h2>Apakah kamu mau baca pesan rahasia dariku?</h2>

<button id="yes" onclick="showMessage()">Mau</button>
<button id="no" onmouseover="moveButton()">Tidak</button>

<p id="message"></p>

<script>

function showMessage(){
document.getElementById("message").innerHTML =
"Jujur aku bikin website kecil ini cuma untuk bilang satu hal... <br><br> Aku suka sama kamu ❤️";
}

function moveButton(){
var button = document.getElementById("no");

var x = Math.random()*window.innerWidth;
var y = Math.random()*window.innerHeight;

button.style.left = x + "px";
button.style.top = y + "px";
}

</script>

</body>
</html>
